name: Build metadata

on:
  release:
    types: [published, edited, unpublished, deleted, released]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
      - 'docs/index.html'
      - 'docs/assets/**'

permissions:
  contents: write

concurrency:
  group: build-metadata
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build metadata from releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          git add docs/apps.json docs/manifest docs/icons
          if git diff --staged --quiet; then
            echo "No metadata changes."
          else
            git commit -m "chore: rebuild apps.json [skip ci]"
            for i in 1 2 3; do
              if git push origin main; then exit 0; fi
              echo "push failed, rebasing onto origin/main and retrying..."
              git fetch origin main
              git rebase origin/main || exit 1
            done
            exit 1
          fi
